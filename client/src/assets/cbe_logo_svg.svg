
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200">
  <rect width="600" height="200" fill="white"/>

  <!-- Gold spiral style icon -->
  <g transform="translate(120,100)">
    <circle cx="0" cy="0" r="55" fill="none" stroke="#c9a227" stroke-width="10"/>
    <path d="M-30,0
             a30,30 0 1,1 60,0
             a20,20 0 1,0 -40,0
             a10,10 0 1,1 20,0"
          fill="none" stroke="#c9a227" stroke-width="10" stroke-linecap="round"/>
  </g>

  <!-- Text -->
  <text x="350" y="95"
        font-family="Arial, Helvetica, sans-serif"
        font-size="34"
        font-weight="700"
        text-anchor="middle"
        fill="#1f3c88">
        Commercial Bank
  </text>

  <text x="350" y="135"
        font-family="Arial, Helvetica, sans-serif"
        font-size="34"
        font-weight="700"
        text-anchor="middle"
        fill="#1f3c88">
        of Ethiopia
  </text>
</svg>
